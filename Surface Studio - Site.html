<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Surface Studio — Marrakech · Surfaces imprimées sur mesure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Fraunces', Georgia, serif;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  html, body { margin: 0; padding: 0; background: #F4F0E8; font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  ::selection { background: #1C1C1A; color: #F4F0E8; }
  html { scroll-behavior: smooth; }
  a { color: inherit; }
  body { overflow-x: hidden; }

  /* Hide scrollbar on filter row */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Marquee */
  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-track {
    animation: marquee 60s linear infinite;
    display: inline-flex;
    white-space: nowrap;
  }

  /* Hero zoom */
  @keyframes slowZoom {
    0%   { transform: scale(1.05); }
    100% { transform: scale(1.18); }
  }
  .slow-zoom { animation: slowZoom 30s ease-out infinite alternate; }

  /* Reveal */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise-in { animation: riseIn 1.2s cubic-bezier(.16,.84,.3,1) both; }
</style>
</head>
